name: Build APK & Auto Release on Main Push

# 触发条件：代码推送到 main 分支
on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      # 1. 安装 Node.js 22
      - name: 设置 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # 2. 安装 Node 依赖（如果你的项目需要）
      - name: 安装项目依赖
        run: npm install --frozen-lockfile

      # 3. 设置 Java 21（Android 构建必需）
      - name: 设置 Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # 4. 给 gradlew 执行权限
      - name: 授权 Gradle
        run: chmod +x gradlew

      # 5. 构建 Release APK
      - name: 构建 APK
        run: ./gradlew assembleRelease

      # 6. 获取版本号（用于命名发布包）
      - name: 获取版本号
        id: get_version
        run: echo "VERSION=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      # 7. 发布到 GitHub Releases
      - name: 发布 APK 到 Releases
        uses: softprops/action-gh-release@v2
        with:
          name: "自动构建版本 ${{ steps.get_version.outputs.VERSION }}"
          tag_name: "auto-${{ steps.get_version.outputs.VERSION }}"
          files: app/build/outputs/apk/release/*.apk  # APK 路径
          generate_release_notes: true                # 自动生成发布说明
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
