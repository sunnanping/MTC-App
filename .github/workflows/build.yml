name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Update Version
        run: |
          RUN_NUMBER=${{ github.run_number }}
          VERSION_NAME="1.0.${RUN_NUMBER}"
          echo "Updating to Version Code: $RUN_NUMBER, Version Name: $VERSION_NAME"
          sed -i "s/versionCode 1/versionCode $RUN_NUMBER/g" android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"$VERSION_NAME\"/g" android/app/build.gradle

      - name: Build APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4g" -Dorg.gradle.parallel=true
          cp app/build/outputs/apk/debug/app-debug.apk ../MTC-App-v1.0.${{ github.run_number }}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: |
            ## MTC App Android Update
            
            - **Version:** 1.0.${{ github.run_number }}
            - **Build:** ${{ github.run_number }}
            - **Commit:** ${{ github.sha }}
            
            Automatically generated by GitHub Actions.
            - `MTC-App-v1.0.x.apk`: Multi-site browser with 5 built-in AI chat services
          files: |
            MTC-App-v1.0.${{ github.run_number }}.apk
          draft: false
          prerelease: false